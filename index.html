<!doctype html>
<html lang="en">

<head>
    <title>Sports Hangman</title>
    <!-- Required meta tags -->
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />

    <!-- Bootstrap CSS v5.2.1 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous" />

    <link rel="stylesheet" href="style.css">
</head>

<body class="container py-4">

    <!-- SCREEN 1: HOME -->
    <div id="screen-home" class="screen active justify-content-center align-items-center">
        <div class="card-box1">

            <h1>Sports Hangman</h1>

            <button onclick="startGame('easy')">Easy</button>
            <button onclick="startGame('medium')">Medium</button>
            <button onclick="startGame('hard')">Hard</button>
        </div>
    </div>

    <!-- SCREEN 2: game screen -->
    <div id="game-screen" class="screen justify-content-center align-items-center">
        <div class="card-box2">
            <div class="medal-container text-center">
                <hr>
                <img id="medal" src="imgs/medal6.png" width="200">
            </div>
            <div id="wordDisplay">

            </div>



            <!-- AI KEYBOARD -->
            <div class="keyboard-container text-center">
                <!-- Row 1: 9 letters -->
                <div class="keyboard-row d-flex justify-content-center flex-wrap">
                    <button class="btn btn-light mx-1 my-1" onclick="keyPress('A')">A</button>
                    <button class="btn btn-light mx-1 my-1" onclick="keyPress('B')">B</button>
                    <button class="btn btn-light mx-1 my-1" onclick="keyPress('C')">C</button>
                    <button class="btn btn-light mx-1 my-1" onclick="keyPress('D')">D</button>
                    <button class="btn btn-light mx-1 my-1" onclick="keyPress('E')">E</button>
                    <button class="btn btn-light mx-1 my-1" onclick="keyPress('F')">F</button>
                    <button class="btn btn-light mx-1 my-1" onclick="keyPress('G')">G</button>
                    <button class="btn btn-light mx-1 my-1" onclick="keyPress('H')">H</button>
                    <button class="btn btn-light mx-1 my-1" onclick="keyPress('I')">I</button>
                </div>

                <!-- Row 2: 9 letters -->
                <div class="keyboard-row d-flex justify-content-center flex-wrap">
                    <button class="btn btn-light mx-1 my-1" onclick="keyPress('J')">J</button>
                    <button class="btn btn-light mx-1 my-1" onclick="keyPress('K')">K</button>
                    <button class="btn btn-light mx-1 my-1" onclick="keyPress('L')">L</button>
                    <button class="btn btn-light mx-1 my-1" onclick="keyPress('M')">M</button>
                    <button class="btn btn-light mx-1 my-1" onclick="keyPress('N')">N</button>
                    <button class="btn btn-light mx-1 my-1" onclick="keyPress('O')">O</button>
                    <button class="btn btn-light mx-1 my-1" onclick="keyPress('P')">P</button>
                    <button class="btn btn-light mx-1 my-1" onclick="keyPress('Q')">Q</button>
                    <button class="btn btn-light mx-1 my-1" onclick="keyPress('R')">R</button>
                </div>

                <!-- Row 3: 8 letters -->
                <div class="keyboard-row d-flex justify-content-center flex-wrap">
                    <button class="btn btn-light mx-1 my-1" onclick="keyPress('S')">S</button>
                    <button class="btn btn-light mx-1 my-1" onclick="keyPress('T')">T</button>
                    <button class="btn btn-light mx-1 my-1" onclick="keyPress('U')">U</button>
                    <button class="btn btn-light mx-1 my-1" onclick="keyPress('V')">V</button>
                    <button class="btn btn-light mx-1 my-1" onclick="keyPress('W')">W</button>
                    <button class="btn btn-light mx-1 my-1" onclick="keyPress('X')">X</button>
                    <button class="btn btn-light mx-1 my-1" onclick="keyPress('Y')">Y</button>
                    <button class="btn btn-light mx-1 my-1" onclick="keyPress('Z')">Z</button>
                </div>
                <div class="keyboard-row big container">
                    <div class="row justify-content-center g-2">

                        <div class="col-12 col-sm-6 col-md-5 col-lg-4">
                            <button class="btn btn-light w-100" onclick="reset('')">
                                New Game
                            </button>
                        </div>

                        <div class="col-12 col-sm-6 col-md-5 col-lg-4">
                            <!-- Hidden input for typing the guess -->
<input type="text" id="guess-input-hidden" placeholder="Type the word" style="display:none;" />

<!-- Your button (keep ID and onclick) -->
<button class="btn btn-light w-100" id="guess-input" onclick="guessWord('')">
    Guess Whole Word
</button>
                        </div>

                    </div>
                </div>
            </div>
            <!-- END OF AI KEYBOARD -->
        </div>
    </div>

<div id="popup" class="popup">
  <div class="popup-box">
    <span id="popup-text"></span>
  </div>
</div>

    
    <script src="script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
        integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r"
        crossorigin="anonymous"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.min.js"
        integrity="sha384-BBtl+eGJRgqQAUMxJ7pMwbEyER4l1g+O15P+16Ep7Q9Q+zqX6gSbd85u4mG4QzX+"
        crossorigin="anonymous"></script>
</body>

</html>
