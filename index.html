<!doctype html>
<html lang="en">

<head>
    <title>Sports Hangman</title>
    <!-- Required meta tags -->
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />

    <!-- Bootstrap CSS v5.2.1 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous" />
</head>

<body>
    <header>
        <!-- place navbar here -->
    </header>
    <main class="container py-4">



        <!-- AI KEYBOARD -->
        <div class="row justify-content-center">
            <div class="col-12 col-sm-10 col-md-7 col-lg-5 col-xl-4">
                <div class="card shadow-sm">
                    <div class="card-body p-3 p-md-4">
                        <div class="d-flex align-items-center justify-content-between mb-3">
                            <h1 class="h5 mb-0">Click a letter</h1>

                            <!-- Row 1: 10 letters -->
                            <div class="keyboard-column">
                                <button onclick="keyPress('A')"><img src="A.png"  width="100" height="75"><span>A</span></button>
                                <button onclick="keyPress('B')"><img src="B.png"  width="100" height="75"><span>B</span></button>
                                <button onclick="keyPress('C')"><img src="C.png"  width="100" height="75"><span>C</span></button>
                                <button onclick="keyPress('D')"><img src="D.png"  width="100" height="75"><span>D</span></button>
                                <button onclick="keyPress('E')"><img src="E.png"  width="100" height="75"><span>E</span></button>
                                <button onclick="keyPress('F')"><img src="F.png"  width="100" height="75"><span>F</span></button>
                                <button onclick="keyPress('G')"><img src="G.png"  width="100" height="75"><span>G</span></button>
                                <button onclick="keyPress('H')"><img src="H.png"  width="100" height="75"><span>H</span></button>
                                <button onclick="keyPress('I')"><img src="I.png"  width="100" height="75"><span>I</span></button>
                                <button onclick="keyPress('J')"><img src="J.png"  width="100" height="75"><span>J</span></button>
                            </div>

                            <!-- Row 2: 9 letters -->
                            <div class="keyboard-column">
                                <button onclick="keyPress('K')"><img src="K.png"  width="100" height="75"><span>K</span></button>
                                <button onclick="keyPress('L')"><img src="L.png"  width="100" height="75"><span>L</span></button>
                                <button onclick="keyPress('M')"><img src="M.png"  width="100" height="75"><span>M</span></button>
                                <button onclick="keyPress('N')"><img src="N.png"  width="100" height="75"><span>N</span></button>
                                <button onclick="keyPress('O')"><img src="O.png"  width="100" height="75"><span>O</span></button>
                                <button onclick="keyPress('P')"><img src="P.png"  width="100" height="75"><span>P</span></button>
                                <button onclick="keyPress('Q')"><img src="Q.png"  width="100" height="75"><span>Q</span></button>
                                <button onclick="keyPress('R')"><img src="R.png"  width="100" height="75"><span>R</span></button>
                                <button onclick="keyPress('S')"><img src="S.png"  width="100" height="75"><span>S</span></button>
                            </div>

                            <!-- Row 3: 7 letters -->
                            <div class="keyboard-column">
                                <button onclick="keyPress('T')"><img src="T.png"  width="100" height="75"><span>T</span></button>
                                <button onclick="keyPress('U')"><img src="U.png"  width="100" height="75"><span>U</span></button>
                                <button onclick="keyPress('V')"><img src="V.png"  width="100" height="75"><span>V</span></button>
                                <button onclick="keyPress('W')"><img src="W.png"  width="100" height="75"><span>W</span></button>
                                <button onclick="keyPress('X')"><img src="X.png"  width="100" height="75"><span>X</span></button>
                                <button onclick="keyPress('Y')"><img src="Y.png"  width="100" height="75"><span>Y</span></button>
                                <button onclick="keyPress('Z')"><img src="Z.png"  width="100" height="75"><span>Z</span></button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <!-- END OF AI KEYBOARD -->
    </main>
    <footer>
        <!-- place footer here -->
    </footer>
    <!-- Bootstrap JavaScript Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
        integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r"
        crossorigin="anonymous"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.min.js"
        integrity="sha384-BBtl+eGJRgqQAUMxJ7pMwbEyER4l1g+O15P+16Ep7Q9Q+zqX6gSbd85u4mG4QzX+"
        crossorigin="anonymous"></script>
</body>

</html>
